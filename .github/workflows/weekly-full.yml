name: Weekly — Full maintenance run

on:
  schedule:
    # Every Sunday at 02:00 UTC
    - cron: '0 2 * * 0'
  workflow_dispatch:
    inputs:
      entry:
        description: 'Optional: single entry ID to run (e.g. C2). Leave blank for all.'
        required: false
        default: ''

jobs:
  full-maintenance:
    name: Full maintenance pass
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic

      - name: Run full maintenance pass
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          cd automation
          if [ -n "${{ github.event.inputs.entry }}" ]; then
            echo "Running single-entry mode for: ${{ github.event.inputs.entry }}"
            python automation_engine.py --mode single --entry "${{ github.event.inputs.entry }}"
          else
            echo "Running full maintenance pass across all entries"
            python automation_engine.py --mode full
          fi

      - name: Upload reports
        uses: actions/upload-artifact@v4
        with:
          name: maintenance-reports-${{ github.run_id }}
          path: automation/reports/
          retention-days: 365

      - name: Create GitHub issue if human review required
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const reportsDir = 'automation/reports';

            if (!fs.existsSync(reportsDir)) {
              console.log('No reports directory found — nothing to review.');
              return;
            }

            const files = fs.readdirSync(reportsDir);

            // Find the human review document from this run
            const reviewFiles = files
              .filter(f => f.startsWith('human_review_'))
              .sort().reverse();

            if (reviewFiles.length === 0) {
              console.log('No human review items — run completed cleanly.');
              return;
            }

            const reviewDoc = fs.readFileSync(
              path.join(reportsDir, reviewFiles[0]), 'utf8'
            );

            // Only create an issue if there are actual items to review
            if (!reviewDoc.includes('## Item')) {
              console.log('Human review document is empty — no action required.');
              return;
            }

            // Count items
            const itemCount = (reviewDoc.match(/## Item \d+/g) || []).length;

            // Build summary from individual reports
            let summary = '';
            const verifyFiles = files.filter(f => f.startsWith('verification_')).sort().reverse();
            const gapFiles = files.filter(f => f.startsWith('gaps_')).sort().reverse();
            const monitorFiles = files.filter(f => f.startsWith('monitoring_')).sort().reverse();

            if (verifyFiles.length > 0) {
              const vReport = fs.readFileSync(path.join(reportsDir, verifyFiles[0]), 'utf8');
              const corrections = (vReport.match(/### [A-G]\d/g) || []).length;
              summary += `- **Verification:** ${corrections} correction(s) found\n`;
            }
            if (gapFiles.length > 0) {
              const gReport = fs.readFileSync(path.join(reportsDir, gapFiles[0]), 'utf8');
              const blocking = (gReport.match(/\*\*[A-G]\d\*\*/g) || []).length;
              summary += `- **Gap detection:** ${blocking} gap(s) flagged\n`;
            }
            if (monitorFiles.length > 0) {
              const mReport = fs.readFileSync(path.join(reportsDir, monitorFiles[0]), 'utf8');
              const actions = (mReport.match(/flag_for_review|draft_update/g) || []).length;
              summary += `- **Monitoring:** ${actions} source(s) with new content\n`;
            }

            const issueBody = `## Weekly maintenance run — ${itemCount} item(s) require review

**Run date:** ${new Date().toISOString().split('T')[0]}
**Run ID:** ${context.runId}

### Summary
${summary || '- See full review document below'}

---

${reviewDoc.substring(0, 60000)}

---

*This issue was created automatically by the weekly maintenance workflow. Review each item, mark your decision (Approve / Reject / Modify), and close the issue when complete.*`;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[Weekly maintenance] ${itemCount} item(s) require human review — ${new Date().toISOString().split('T')[0]}`,
              body: issueBody,
              labels: ['automation', 'human-review-required', 'weekly-maintenance']
            });

            console.log(`Created issue with ${itemCount} review items.`);

      - name: Post run summary
        if: always()
        run: |
          echo "## Weekly maintenance run complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Run date:** $(date -u +%Y-%m-%d)" >> $GITHUB_STEP_SUMMARY
          echo "**Mode:** ${{ github.event.inputs.entry && 'single-entry' || 'full' }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -d "automation/reports" ]; then
            echo "**Reports generated:**" >> $GITHUB_STEP_SUMMARY
            ls automation/reports/ | sed 's/^/- /' >> $GITHUB_STEP_SUMMARY
          fi
